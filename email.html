<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 이메일 작성 — BridgeX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root { --blue:#0066cc; --blue-focus:#0071e3; --ink:#1d1d1f; --muted:#6e6e73; --parchment:#f5f5f7; --white:#fff; --hairline:#e0e0e0; --shadow:0 2px 20px rgba(0,0,0,0.06); }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--parchment);color:var(--ink);font-family:'Inter','Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;word-break:keep-all;}
  a{color:inherit;text-decoration:none;} h1,h2,h3,p{margin:0;}
  nav{position:sticky;top:0;z-index:40;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(20px,5vw,40px);background:rgba(250,248,244,0.9);backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid rgba(0,0,0,0.07);}
  .logo{font-size:20px;font-weight:800;letter-spacing:-0.5px;} .logo span{color:var(--blue);}
  .nav-right{display:flex;gap:18px;align-items:center;}
  .nav-link{font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;background:none;border:none;font-family:inherit;}
  .nav-link:hover{color:var(--ink);}
  .wrap{max-width:760px;margin:0 auto;padding:clamp(24px,5vw,44px) clamp(16px,4vw,24px) 80px;}
  .head h1{font-size:clamp(24px,4vw,32px);font-weight:800;letter-spacing:-0.6px;}
  .head p{font-size:15px;color:var(--muted);margin-top:8px;}
  .card{background:var(--white);border-radius:18px;box-shadow:var(--shadow);padding:clamp(22px,4vw,30px);margin-top:22px;}
  .card h2{font-size:15px;font-weight:800;margin:0 0 4px;}
  .card .ch-sub{font-size:13px;color:var(--muted);margin-bottom:16px;}

  .situations{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;}
  .sit{text-align:left;background:var(--parchment);border:1.5px solid transparent;border-radius:12px;padding:14px;cursor:pointer;font-family:inherit;transition:all .15s;}
  .sit:hover{border-color:rgba(0,102,204,0.35);}
  .sit.on{background:rgba(0,102,204,0.08);border-color:var(--blue);}
  .sit-label{font-size:14px;font-weight:700;color:var(--ink);}
  .sit.on .sit-label{color:var(--blue);}
  .sit-desc{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.4;}

  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13px;font-weight:700;margin-bottom:7px;}
  .field .req{color:var(--blue);}
  .field input{width:100%;height:46px;padding:0 14px;font-size:15px;font-family:inherit;border:1px solid var(--hairline);border-radius:11px;outline:none;}
  .field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,102,204,0.12);}
  .ctxnote{font-size:12.5px;color:var(--muted);background:rgba(0,102,204,0.05);border-left:3px solid rgba(0,102,204,0.4);border-radius:8px;padding:10px 12px;margin-bottom:16px;}

  .btn{height:50px;padding:0 26px;border-radius:999px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:transform .15s,box-shadow .15s;}
  .btn-primary{background:var(--blue-focus);color:#fff;box-shadow:0 6px 20px rgba(0,102,204,0.28);width:100%;}
  .btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 26px rgba(0,102,204,0.36);}
  .btn-primary:disabled{opacity:.5;cursor:default;}
  .btn-ghost{background:var(--white);color:var(--muted);border:1px solid var(--hairline);height:40px;padding:0 16px;font-size:13px;}
  .btn-ghost:hover{color:var(--ink);border-color:var(--muted);}

  .draft-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
  .draft-label{font-size:12px;font-weight:700;color:var(--muted);margin:14px 0 6px;}
  .draft input,.draft textarea{width:100%;font-family:inherit;font-size:14px;border:1px solid var(--hairline);border-radius:10px;padding:12px 14px;outline:none;background:var(--white);color:var(--ink);}
  .draft input{height:46px;}
  .draft textarea{min-height:280px;line-height:1.6;resize:vertical;white-space:pre-wrap;}
  .draft input:focus,.draft textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,102,204,0.1);}
  .copyrow{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .copied{font-size:13px;color:#1e7a50;font-weight:600;align-self:center;}
  .tip{font-size:12.5px;color:var(--muted);margin-top:14px;line-height:1.6;}
  .loading{text-align:center;padding:60px 0;color:var(--muted);font-size:14px;}
</style>
</head>
<body>
  <nav>
    <a href="mypage.html" class="logo">Bridge<span>X</span></a>
    <div class="nav-right"><a href="mypage.html" class="nav-link">내 페이지</a><button class="nav-link" id="logout">로그아웃</button></div>
  </nav>

  <div class="wrap">
    <div class="loading" id="loading">불러오는 중…</div>
    <div id="app" style="display:none;">
      <div class="head">
        <h1>AI 이메일 작성 도구</h1>
        <p>상황을 고르고 바이어 정보만 입력하면, 내 제품 정보로 <b>영문 이메일 초안</b>을 만들어드립니다. 복사해서 바로 쓰세요.</p>
      </div>

      <div class="card">
        <h2>1. 상황 선택</h2>
        <div class="ch-sub">보내려는 이메일의 상황을 고르세요.</div>
        <div class="situations" id="situations"></div>
      </div>

      <div class="card" id="inputCard" style="display:none;">
        <h2>2. 바이어 정보 입력</h2>
        <div class="ch-sub" id="inputSub"></div>
        <div class="ctxnote" id="ctxNote"></div>
        <div id="fields"></div>
        <button class="btn btn-primary" id="genBtn">영문 초안 생성 →</button>
      </div>

      <div class="card draft" id="draftCard" style="display:none;">
        <div class="draft-head"><h2 style="margin:0;">3. 이메일 초안 (편집 가능)</h2></div>
        <div class="draft-label">제목</div>
        <input id="draftSubject" type="text">
        <div class="draft-label">본문</div>
        <textarea id="draftBody"></textarea>
        <div class="copyrow">
          <button class="btn btn-ghost" id="copySubject">제목 복사</button>
          <button class="btn btn-ghost" id="copyBody">본문 복사</button>
          <button class="btn btn-ghost" id="copyAll">전체 복사</button>
          <span class="copied" id="copied" style="display:none;">✓ 복사됨</span>
        </div>
        <div class="tip">💡 이 초안은 시작점입니다. 바이어·상황에 맞게 자유롭게 다듬은 뒤 본인 메일함에서 발송하세요. (BridgeX는 발송하지 않습니다.)</div>
      </div>
    </div>
  </div>

<script>
  var API_BASE = (location.protocol === 'file:' || ['localhost','127.0.0.1'].includes(location.hostname)) ? 'http://localhost:4000' : '';
  var TOKEN_KEY = 'bridgex_member_token';
  var token = null; try { token = localStorage.getItem(TOKEN_KEY); } catch(e){}
  var templates = [], selected = null;
  var $ = function(id){ return document.getElementById(id); };
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function logout(){ try{localStorage.removeItem(TOKEN_KEY);}catch(e){} location.href='index.html'; }
  $('logout').addEventListener('click', logout);

  async function init(){
    if(!token){ location.href='index.html'; return; }
    try{
      var res = await fetch(API_BASE+'/api/members/me/email-templates', { headers:{Authorization:'Bearer '+token} });
      if(res.status===401){ logout(); return; }
      var j = await res.json();
      templates = j.data || [];
    }catch(e){ $('loading').textContent='불러오지 못했습니다. 백엔드 서버를 확인해주세요.'; return; }
    $('loading').style.display='none'; $('app').style.display='block';
    renderSituations();
  }

  function renderSituations(){
    $('situations').innerHTML = templates.map(function(t){
      return '<button type="button" class="sit" data-key="'+t.key+'"><div class="sit-label">'+esc(t.label)+'</div><div class="sit-desc">'+esc(t.desc)+'</div></button>';
    }).join('');
    $('situations').querySelectorAll('.sit').forEach(function(b){ b.onclick=function(){ selectSituation(b.dataset.key); }; });
  }

  function selectSituation(key){
    selected = templates.find(function(t){ return t.key===key; });
    $('situations').querySelectorAll('.sit').forEach(function(b){ b.classList.toggle('on', b.dataset.key===key); });
    $('inputSub').textContent = selected.label + ' — 아래 정보를 채워주세요.';
    $('ctxNote').innerHTML = '✓ 내 제품·회사·인증 정보는 진단 데이터에서 자동으로 채워집니다. 바이어 정보만 입력하세요.';
    $('fields').innerHTML = selected.fields.map(function(f){
      return '<div class="field"><label>'+esc(f.label)+(f.required?' <span class="req">*</span>':'')+'</label>'
        + '<input type="text" data-field="'+f.key+'" placeholder="'+esc(f.placeholder||'')+'"></div>';
    }).join('');
    $('inputCard').style.display='block';
    $('draftCard').style.display='none';
    $('inputCard').scrollIntoView({behavior:'smooth', block:'nearest'});
  }

  $('genBtn').addEventListener('click', async function(){
    if(!selected) return;
    var inputs = {};
    var missing = false;
    selected.fields.forEach(function(f){
      var el = $('fields').querySelector('[data-field="'+f.key+'"]');
      var v = el.value.trim(); inputs[f.key]=v;
      if(f.required && !v){ el.style.borderColor='#d64545'; missing=true; } else el.style.borderColor='';
    });
    if(missing){ return; }
    var btn=$('genBtn'); btn.disabled=true; btn.textContent='생성 중…';
    try{
      var res = await fetch(API_BASE+'/api/members/me/email-draft', { method:'POST', headers:{'Content-Type':'application/json',Authorization:'Bearer '+token}, body:JSON.stringify({situation:selected.key, inputs:inputs}) });
      var j = await res.json();
      if(!res.ok || !j.success) throw new Error(j.message||'생성 실패');
      $('draftSubject').value = j.data.subject;
      $('draftBody').value = j.data.body;
      $('draftCard').style.display='block';
      $('draftCard').scrollIntoView({behavior:'smooth', block:'start'});
    }catch(e){ alert(e.message); }
    finally{ btn.disabled=false; btn.textContent='영문 초안 생성 →'; }
  });

  function copy(text){
    navigator.clipboard.writeText(text).then(function(){
      var c=$('copied'); c.style.display='inline'; setTimeout(function(){c.style.display='none';}, 1800);
    });
  }
  $('copySubject').addEventListener('click', function(){ copy($('draftSubject').value); });
  $('copyBody').addEventListener('click', function(){ copy($('draftBody').value); });
  $('copyAll').addEventListener('click', function(){ copy('Subject: '+$('draftSubject').value+'\n\n'+$('draftBody').value); });

  init();
</script>
</body>
</html>
